<!DOCTYPE html>
<html>
<head>
  <title>Quick Perplexes — Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .pass { color: green; }
    .fail { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Quick Perplexes Unit Tests</h2>
  <div id="results"></div>
  <script>
    function buildSearchUrl(query) {
      return 'https://www.perplexity.ai/search?q=' + encodeURIComponent(query.trim());
    }

    const tests = [
      {
        name: 'basic query',
        input: 'hello world',
        expected: 'https://www.perplexity.ai/search?q=hello%20world'
      },
      {
        name: 'query with special chars',
        input: 'c++ templates',
        expected: 'https://www.perplexity.ai/search?q=c%2B%2B%20templates'
      },
      {
        name: 'trims whitespace',
        input: '  spaced  ',
        expected: 'https://www.perplexity.ai/search?q=spaced'
      },
      {
        name: 'unicode query',
        input: 'résumé café',
        expected: 'https://www.perplexity.ai/search?q=r%C3%A9sum%C3%A9%20caf%C3%A9'
      }
    ];

    const results = document.getElementById('results');
    let passed = 0;

    tests.forEach(({ name, input, expected }) => {
      const actual = buildSearchUrl(input);
      const ok = actual === expected;
      if (ok) passed++;
      const div = document.createElement('div');
      div.className = ok ? 'pass' : 'fail';
      div.textContent = (ok ? '✓' : '✗') + ' ' + name
        + (ok ? '' : '\n  expected: ' + expected + '\n  actual:   ' + actual);
      div.style.whiteSpace = 'pre';
      results.appendChild(div);
    });

    const summary = document.createElement('p');
    summary.textContent = passed + '/' + tests.length + ' tests passed';
    summary.style.fontWeight = 'bold';
    results.appendChild(summary);
  </script>
</body>
</html>
